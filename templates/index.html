<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK's PDF Reader</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>VK's PDF Reader</header>
    <div class="container">
        <aside class="sidebar">
            <h3>Upload PDFs</h3>
            <div class="upload-area" id="upload-area">
                <p>Drop PDFs here or click to upload</p>
                <input type="file" id="file-input" accept=".pdf" multiple>
            </div>
            <h3>Documents</h3>
            <div class="doc-list" id="doc-list"></div>
        </aside>
        <main class="chat-area">
            <div class="messages" id="messages">
                <div class="empty-state" id="empty-state">Upload a PDF and ask a question</div>
            </div>
            <div class="input-bar">
                <input type="text" id="query-input" placeholder="Ask a question about your documents..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </main>
    </div>

<script>
const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('empty-state');
const queryInput = document.getElementById('query-input');
const sendBtn = document.getElementById('send-btn');
const uploadArea = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');
const docList = document.getElementById('doc-list');

let chatHistory = [];
let streaming = false;

// --- Documents ---
async function loadDocuments() {
    const res = await fetch('/documents');
    const data = await res.json();
    docList.innerHTML = '';
    data.documents.forEach(name => {
        const div = document.createElement('div');
        div.className = 'doc-item';
        const span = document.createElement('span');
        span.textContent = name;
        div.appendChild(span);
        const btn = document.createElement('button');
        btn.className = 'doc-delete';
        btn.textContent = '\u00d7';
        btn.title = 'Remove document';
        btn.addEventListener('click', () => deleteDocument(name));
        div.appendChild(btn);
        docList.appendChild(div);
    });
}
loadDocuments();

// --- Upload ---
uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    uploadFiles(e.dataTransfer.files);
});

async function uploadFiles(files) {
    if (!files.length) return;
    const form = new FormData();
    for (const f of files) form.append('files', f);

    uploadArea.querySelector('p').textContent = 'Uploading...';
    const res = await fetch('/upload', { method: 'POST', body: form });
    const data = await res.json();
    uploadArea.querySelector('p').textContent = `Uploaded ${data.uploaded.length} file(s)`;
    setTimeout(() => {
        uploadArea.querySelector('p').textContent = 'Drop PDFs here or click to upload';
    }, 3000);
    loadDocuments();
}

// --- Delete ---
async function deleteDocument(name) {
    await fetch(`/documents/${encodeURIComponent(name)}`, { method: 'DELETE' });
    loadDocuments();
}

// --- Chat ---
function addMessage(role, text) {
    if (emptyState) emptyState.remove();
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
}

async function sendMessage() {
    const query = queryInput.value.trim();
    if (!query || streaming) return;

    addMessage('user', query);
    chatHistory.push({ role: 'user', content: query });
    queryInput.value = '';

    streaming = true;
    sendBtn.disabled = true;

    const assistantDiv = addMessage('assistant', '');
    let fullResponse = '';

    const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, history: chatHistory.slice(0, -1) }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let sources = [];

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') continue;

            try {
                const data = JSON.parse(payload);
                if (data.type === 'sources') {
                    sources = data.sources;
                } else if (data.type === 'token') {
                    fullResponse += data.content;
                    assistantDiv.textContent = fullResponse;
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }
            } catch {}
        }
    }

    // Add source references
    if (sources.length > 0) {
        const sourcesDiv = document.createElement('div');
        sourcesDiv.className = 'sources';
        const uniqueFiles = [...new Set(sources.map(s => s.source_file))];
        sourcesDiv.innerHTML = 'Sources: ' + uniqueFiles.map(f => `<span>${f}</span>`).join('');
        assistantDiv.appendChild(sourcesDiv);
    }

    chatHistory.push({ role: 'assistant', content: fullResponse });
    streaming = false;
    sendBtn.disabled = false;
    queryInput.focus();
}

sendBtn.addEventListener('click', sendMessage);
queryInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
